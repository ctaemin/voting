<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>투표 관리자</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,300,0,0" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        primary: '#006e2e',
        'primary-container': '#03c75a',
        'background-alt': '#F4F6F8',
        'border-light': '#EAEBEE',
        'text-primary': '#000000',
        'text-secondary': '#666666',
        'text-tertiary': '#999999',
      },
      fontFamily: {
        sans: ['Inter', 'system-ui', 'sans-serif'],
        headline: ['"Plus Jakarta Sans"', 'sans-serif'],
      },
    }
  }
}
</script>
<style>
  body { font-family: 'Inter', sans-serif; }
  .headline { font-family: 'Plus Jakarta Sans', sans-serif; }
  .material-symbols-outlined { font-size: 22px; vertical-align: middle; }
  input:focus { outline: none; }
  .idea-edit-input:focus { border-color: #03c75a; }
</style>
</head>
<body class="bg-white min-h-screen">

<!-- ══════ 로그인 ══════ -->
<div id="login-screen" class="min-h-screen flex items-center justify-center bg-background-alt px-4">
  <div class="bg-white w-full max-w-sm rounded-xl border border-border-light p-8" style="box-shadow:0 4px 12px rgba(0,0,0,.05)">
    <div class="text-center mb-8">
      <div class="text-primary-container text-4xl mb-2">🗳️</div>
      <h1 class="headline text-2xl font-bold text-text-primary">투표 관리자</h1>
      <p class="text-text-secondary text-sm mt-1">관리자 계정으로 로그인하세요</p>
    </div>

    <div class="space-y-4">
      <div>
        <label class="text-sm font-medium text-text-secondary block mb-1.5">아이디</label>
        <input id="login-id" type="text" placeholder="admin" autocomplete="username"
          class="w-full px-4 py-3 rounded-lg border border-border-light bg-background-alt text-text-primary text-sm transition-all"
          style="transition: border-color .15s"
          onfocus="this.style.borderColor='#03c75a';this.style.background='#fff'"
          onblur="this.style.borderColor='';this.style.background=''">
      </div>
      <div>
        <label class="text-sm font-medium text-text-secondary block mb-1.5">비밀번호</label>
        <input id="login-pw" type="password" placeholder="••••" autocomplete="current-password"
          class="w-full px-4 py-3 rounded-lg border border-border-light bg-background-alt text-text-primary text-sm"
          style="transition: border-color .15s"
          onfocus="this.style.borderColor='#03c75a';this.style.background='#fff'"
          onblur="this.style.borderColor='';this.style.background=''">
      </div>
      <p id="login-error" class="text-red-500 text-sm hidden">아이디 또는 비밀번호가 올바르지 않습니다.</p>
      <button onclick="doLogin()"
        class="w-full py-3.5 rounded-lg text-white font-semibold text-sm transition-opacity active:opacity-75"
        style="background:#03c75a">
        로그인
      </button>
    </div>
  </div>
</div>

<!-- ══════ 관리자 화면 ══════ -->
<div id="admin-screen" class="hidden">

  <!-- 헤더 -->
  <header class="sticky top-0 z-10 bg-white border-b border-border-light px-4 py-3 flex items-center justify-between">
    <div class="flex items-center gap-2">
      <span class="material-symbols-outlined" style="color:#03c75a">how_to_vote</span>
      <span class="headline font-bold text-lg text-text-primary">투표 관리자</span>
    </div>
    <button onclick="doLogout()" class="flex items-center gap-1 text-text-secondary text-sm px-3 py-1.5 rounded-lg border border-border-light bg-background-alt">
      <span class="material-symbols-outlined text-base" style="font-size:16px">logout</span>
      로그아웃
    </button>
  </header>

  <div class="max-w-xl mx-auto px-4 py-5 space-y-4">

    <!-- 아이디어 관리 -->
    <section class="bg-white rounded-xl border border-border-light overflow-hidden">
      <div class="px-5 py-4 border-b border-border-light">
        <h2 class="headline font-bold text-base text-text-primary">아이디어 관리</h2>
        <p class="text-text-secondary text-xs mt-0.5">추가하거나 ✏️ 수정, 🗑 삭제할 수 있습니다</p>
      </div>

      <!-- 추가 입력 -->
      <div class="px-5 py-4 border-b border-border-light">
        <div class="flex gap-2">
          <input id="new-idea" type="text" placeholder="새 아이디어를 입력하세요"
            class="flex-1 px-3.5 py-2.5 rounded-lg border border-border-light bg-background-alt text-text-primary text-sm"
            style="transition: border-color .15s"
            onfocus="this.style.borderColor='#03c75a';this.style.background='#fff'"
            onblur="this.style.borderColor='';this.style.background=''">
          <button onclick="addIdea()"
            class="px-4 py-2.5 rounded-lg text-white text-sm font-semibold shrink-0 active:opacity-75"
            style="background:#03c75a">
            추가
          </button>
        </div>
      </div>

      <!-- 아이디어 목록 -->
      <ul id="idea-list" class="divide-y divide-border-light"></ul>

      <!-- 아이디어 전체 삭제 -->
      <div class="px-5 py-3 border-t border-border-light">
        <button onclick="clearAllIdeas()"
          class="w-full flex items-center justify-center gap-1.5 py-2.5 rounded-lg border text-sm font-semibold text-red-500 border-red-200 bg-red-50 active:opacity-75">
          <span class="material-symbols-outlined" style="font-size:16px;color:inherit">delete_sweep</span>
          아이디어 전체 삭제
        </button>
      </div>

      <!-- 선택 수 + 저장 -->
      <div class="px-5 py-4 bg-background-alt flex items-center justify-between gap-4">
        <div class="flex items-center gap-3">
          <label class="text-sm text-text-secondary font-medium whitespace-nowrap">1인당 선택 수</label>
          <input id="max-votes" type="number" value="2" min="1" max="10"
            class="w-16 px-3 py-2 rounded-lg border border-border-light bg-white text-center text-sm font-semibold text-text-primary">
        </div>
        <button onclick="saveConfig()"
          class="flex items-center gap-1.5 px-5 py-2.5 rounded-lg text-white text-sm font-semibold active:opacity-75"
          style="background:#006e2e">
          <span class="material-symbols-outlined" style="font-size:16px">save</span>
          설정 저장
        </button>
      </div>
    </section>

    <!-- 투표 제어 -->
    <section class="bg-white rounded-xl border border-border-light overflow-hidden">
      <div class="px-5 py-4 border-b border-border-light flex items-center justify-between">
        <h2 class="headline font-bold text-base text-text-primary">투표 제어</h2>
        <span id="status-badge" class="text-xs font-semibold px-3 py-1 rounded-full">확인 중...</span>
      </div>
      <div class="px-5 py-4 flex gap-3">
        <button onclick="setOpen(true)"
          class="flex-1 flex items-center justify-center gap-1.5 py-3 rounded-lg text-white text-sm font-semibold active:opacity-75"
          style="background:#03c75a">
          <span class="material-symbols-outlined" style="font-size:18px">play_arrow</span>
          투표 시작
        </button>
        <button onclick="setOpen(false)"
          class="flex-1 flex items-center justify-center gap-1.5 py-3 rounded-lg text-text-secondary text-sm font-semibold bg-background-alt border border-border-light active:opacity-75">
          <span class="material-symbols-outlined" style="font-size:18px">stop</span>
          투표 종료
        </button>
      </div>
    </section>

    <!-- QR 코드 -->
    <section class="bg-white rounded-xl border border-border-light overflow-hidden">
      <div class="px-5 py-4 border-b border-border-light">
        <h2 class="headline font-bold text-base text-text-primary">QR코드 / 참여 링크</h2>
      </div>
      <div class="px-5 py-5 text-center">
        <div id="qrcode" class="inline-block rounded-xl overflow-hidden border border-border-light p-3 bg-white mb-3"></div>
        <div class="bg-background-alt rounded-lg px-4 py-2.5 text-xs text-text-secondary break-all" id="vote-url">배포 후 자동 표시됩니다</div>
        <p class="text-text-tertiary text-xs mt-2">참석자가 QR코드를 스캔하면 투표 화면으로 이동합니다</p>
      </div>
    </section>

    <!-- 실시간 현황 -->
    <section class="bg-white rounded-xl border border-border-light overflow-hidden">
      <div class="px-5 py-4 border-b border-border-light flex items-center justify-between">
        <h2 class="headline font-bold text-base text-text-primary">실시간 현황</h2>
        <span id="voter-count" class="text-xs text-text-secondary"></span>
      </div>
      <div id="results" class="px-5 py-4">
        <p class="text-text-tertiary text-sm text-center py-4">불러오는 중...</p>
      </div>
      <div class="px-5 pb-5">
        <button onclick="resetVotes()"
          class="w-full flex items-center justify-center gap-1.5 py-3 rounded-lg border text-sm font-semibold text-red-500 border-red-200 bg-red-50 active:opacity-75">
          <span class="material-symbols-outlined" style="font-size:16px;color:inherit">delete</span>
          투표 초기화
        </button>
      </div>
    </section>

  </div><!-- /max-w -->
</div><!-- /admin-screen -->

<script>
const ADMIN_ID = "admin";
const ADMIN_PW = "1234";
const API_SECRET = "1234";

let ideas = [];
let currentIsOpen = false;
let qrGenerated = false;

// ── 로그인 ────────────────────────────────────
function doLogin() {
  const id = document.getElementById("login-id").value.trim();
  const pw = document.getElementById("login-pw").value;
  const err = document.getElementById("login-error");
  if (id === ADMIN_ID && pw === ADMIN_PW) {
    err.classList.add("hidden");
    document.getElementById("login-screen").classList.add("hidden");
    document.getElementById("admin-screen").classList.remove("hidden");
    loadConfig();
    loadResults();
    setInterval(loadResults, 5000);
  } else {
    err.classList.remove("hidden");
  }
}

function doLogout() {
  document.getElementById("admin-screen").classList.add("hidden");
  document.getElementById("login-screen").classList.remove("hidden");
  document.getElementById("login-id").value = "";
  document.getElementById("login-pw").value = "";
}

["login-id","login-pw"].forEach(id =>
  document.getElementById(id).addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); })
);

// ── 아이디어 ──────────────────────────────────
function addIdea() {
  const input = document.getElementById("new-idea");
  const val = input.value.trim();
  if (!val) return;
  ideas.push(val);
  input.value = "";
  renderIdeas();
}
document.getElementById("new-idea").addEventListener("keydown", e => { if (e.key === "Enter") addIdea(); });

function removeIdea(i) {
  if (!confirm(`"${ideas[i]}" 을(를) 삭제하시겠습니까?`)) return;
  ideas.splice(i, 1);
  renderIdeas();
}

function startEdit(i) {
  const item = document.getElementById(`idea-item-${i}`);
  item.innerHTML = `
    <div class="flex items-center gap-2 px-5 py-3">
      <span class="text-text-tertiary text-sm w-5 shrink-0">${i+1}</span>
      <input id="edit-input-${i}" value="${ideas[i]}"
        class="flex-1 px-3 py-2 rounded-lg border text-sm text-text-primary"
        style="border-color:#03c75a; background:#fff; outline:none;">
      <button onclick="confirmEdit(${i})"
        class="px-3 py-2 rounded-lg text-white text-xs font-semibold shrink-0 active:opacity-75" style="background:#03c75a">저장</button>
      <button onclick="renderIdeas()"
        class="px-3 py-2 rounded-lg text-text-secondary text-xs font-semibold shrink-0 bg-background-alt border border-border-light active:opacity-75">취소</button>
    </div>`;
  const inp = document.getElementById(`edit-input-${i}`);
  inp.focus();
  inp.addEventListener("keydown", e => {
    if (e.key === "Enter") confirmEdit(i);
    if (e.key === "Escape") renderIdeas();
  });
}

function confirmEdit(i) {
  const val = document.getElementById(`edit-input-${i}`).value.trim();
  if (!val) return alert("내용을 입력해주세요.");
  ideas[i] = val;
  renderIdeas();
}

function renderIdeas() {
  const ul = document.getElementById("idea-list");
  if (!ideas.length) {
    ul.innerHTML = `<li class="px-5 py-5 text-center text-text-tertiary text-sm">아이디어를 추가해주세요</li>`;
    return;
  }
  ul.innerHTML = ideas.map((idea, i) => `
    <li id="idea-item-${i}" class="group">
      <div class="flex items-center gap-3 px-5 py-3.5">
        <span class="text-text-tertiary text-sm w-5 shrink-0 font-medium">${i+1}</span>
        <span class="flex-1 text-sm text-text-primary">${idea}</span>
        <button onclick="startEdit(${i})"
          class="p-1.5 rounded-lg text-text-secondary hover:bg-background-alt active:opacity-75">
          <span class="material-symbols-outlined" style="font-size:18px">edit</span>
        </button>
        <button onclick="removeIdea(${i})"
          class="p-1.5 rounded-lg text-red-400 hover:bg-red-50 active:opacity-75">
          <span class="material-symbols-outlined" style="font-size:18px">delete</span>
        </button>
      </div>
    </li>`).join("");
}

// ── API ───────────────────────────────────────
async function loadConfig() {
  try {
    const res = await fetch("/api/config");
    const data = await res.json();
    if (data.error) return;
    ideas = data.ideas;
    document.getElementById("max-votes").value = data.maxVotes;
    currentIsOpen = data.isOpen;
    renderIdeas();
    updateStatusBadge();
    generateQR();
  } catch(e) { console.error(e); }
}

async function saveConfig() {
  const maxVotes = parseInt(document.getElementById("max-votes").value);
  try {
    const res = await fetch("/api/config", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ secret: API_SECRET, ideas, maxVotes, isOpen: currentIsOpen }),
    });
    const data = await res.json();
    if (data.error) return alert("❌ " + data.error);
    alert("✅ 저장되었습니다!");
  } catch(e) { alert("네트워크 오류: " + e.message); }
}

async function setOpen(isOpen) {
  const maxVotes = parseInt(document.getElementById("max-votes").value);
  try {
    const res = await fetch("/api/config", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ secret: API_SECRET, ideas, maxVotes, isOpen, newSession: isOpen }),
    });
    const data = await res.json();
    if (data.error) return alert("❌ " + data.error);
    currentIsOpen = isOpen;
    updateStatusBadge();
  } catch(e) { alert("네트워크 오류: " + e.message); }
}

function updateStatusBadge() {
  const b = document.getElementById("status-badge");
  if (currentIsOpen) {
    b.textContent = "투표 진행중";
    b.style.cssText = "background:#dcfce7;color:#16a34a";
  } else {
    b.textContent = "투표 종료";
    b.style.cssText = "background:#F4F6F8;color:#666666";
  }
}

function generateQR() {
  if (qrGenerated) return;
  const url = location.origin + "/vote.html";
  document.getElementById("vote-url").textContent = url;
  document.getElementById("qrcode").innerHTML = "";
  new QRCode(document.getElementById("qrcode"), { text: url, width: 180, height: 180, correctLevel: QRCode.CorrectLevel.H });
  qrGenerated = true;
}

async function loadResults() {
  try {
    const res = await fetch("/api/votes");
    const data = await res.json();
    if (data.error) return;
    const { totals, totalVoters, ideas: ideaList } = data;

    document.getElementById("voter-count").textContent = `총 ${totalVoters}명 참여`;

    if (!ideaList.length) {
      document.getElementById("results").innerHTML = `<p class="text-text-tertiary text-sm text-center py-4">아이디어를 먼저 등록해주세요</p>`;
      return;
    }

    const indexed = ideaList.map((name, i) => ({ name, votes: totals[i] || 0 }));
    indexed.sort((a, b) => b.votes - a.votes);
    const max = indexed[0]?.votes || 1;

    document.getElementById("results").innerHTML = indexed.map((item, rank) => {
      const medal = rank === 0 ? "🥇" : rank === 1 ? "🥈" : rank === 2 ? "🥉" : `${rank+1}.`;
      const barColor = rank === 0 ? "#f59e0b" : rank === 1 ? "#94a3b8" : "#03c75a";
      const pct = max > 0 ? Math.round((item.votes / max) * 100) : 0;
      return `
        <div class="mb-3 last:mb-0">
          <div class="flex justify-between items-center mb-1.5">
            <span class="text-sm text-text-primary font-medium">${medal} ${item.name}</span>
            <span class="text-sm font-semibold" style="color:${barColor}">${item.votes}표</span>
          </div>
          <div class="h-2 bg-background-alt rounded-full overflow-hidden">
            <div class="h-full rounded-full transition-all duration-500" style="width:${pct}%;background:${barColor}"></div>
          </div>
        </div>`;
    }).join("");
  } catch(e) { console.error(e); }
}

async function clearAllIdeas() {
  if (!confirm("아이디어를 전체 삭제하시겠습니까?\n투표 데이터도 함께 초기화됩니다.")) return;
  try {
    // 투표 데이터 초기화
    await fetch("/api/votes", {
      method: "DELETE",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ secret: API_SECRET }),
    });
    // 아이디어 목록 비우고 저장
    ideas = [];
    const maxVotes = parseInt(document.getElementById("max-votes").value);
    const res = await fetch("/api/config", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ secret: API_SECRET, ideas: [], maxVotes, isOpen: false, newSession: true }),
    });
    const data = await res.json();
    if (data.error) return alert("❌ " + data.error);
    currentIsOpen = false;
    updateStatusBadge();
    renderIdeas();
    loadResults();
    alert("✅ 아이디어 및 투표 데이터가 모두 삭제되었습니다.");
  } catch(e) { alert("네트워크 오류: " + e.message); }
}

async function resetVotes() {
  if (!confirm("모든 투표 데이터를 삭제하시겠습니까?")) return;
  try {
    const res = await fetch("/api/votes", {
      method: "DELETE",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ secret: API_SECRET }),
    });
    const data = await res.json();
    if (data.error) return alert("❌ " + data.error);
    // 세션 번호 갱신 → 모든 참석자 재투표 가능
    const maxVotes = parseInt(document.getElementById("max-votes").value);
    await fetch("/api/config", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ secret: API_SECRET, ideas, maxVotes, isOpen: currentIsOpen, newSession: true }),
    });
    alert("✅ 초기화 완료! 참석자들이 다시 투표할 수 있습니다.");
    loadResults();
  } catch(e) { alert("네트워크 오류: " + e.message); }
}
</script>
</body>
</html>
